<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unlock Property | AuctionPropertyToday</title>
  
  <!-- Critical Stylesheets -->
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/pages.css">

  <!-- Immediate Theme Lock & Route Guard -->
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    const isAdmin = localStorage.getItem('isAdmin') === 'true';
    const hasAuthToken = localStorage.getItem('sb-xqhrjhvbustdwmrmikya-auth-token') !== null;
    const isClient = JSON.parse(localStorage.getItem('clientSession') || '{}').authenticated === true;
    if (!isAdmin && !hasAuthToken && !isClient) {
      window.location.replace("login.html");
    }
  </script>

  <!-- Supabase & Razorpay Ingress -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="services/supabaseClient.js"></script>

</head>
<body>

  <!-- Unlock Core Wrapper -->
  <main class="container" style="padding: 10rem 0 6rem 0; min-height: 85vh; display: flex; align-items: center; justify-content: center; box-sizing: border-box;">
    
    <div id="unlock-card-container" class="inquiry-form-card glassmorphism" style="max-width: 500px; width: 100%; padding: 2.5rem; border-radius: 8px; border: 1px solid var(--border-color); text-align: center; position: relative; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.5);">
      
      <!-- Skeletal Loader State -->
      <div id="unlock-loading-state" style="padding: 2rem 0;">
        <div class="skeleton" style="width: 60px; height: 60px; border-radius: 50%; display: inline-block; margin-bottom: 1.5rem;"></div>
        <div class="skeleton" style="height: 24px; width: 80%; margin: 0 auto 1rem auto; border-radius: 4px;"></div>
        <div class="skeleton" style="height: 16px; width: 50%; margin: 0 auto 2rem auto; border-radius: 4px;"></div>
        <div class="skeleton" style="height: 45px; width: 100%; border-radius: 4px;"></div>
      </div>

      <!-- Loaded Active State -->
      <div id="unlock-active-state" style="display: none;">
        <span class="apple-subtitle" style="color: var(--gold-primary); font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase;">Exclusive File Access</span>
        <h2 class="luxury-heading" style="font-size: 1.8rem; margin-top: 0.5rem; margin-bottom: 1.5rem; font-weight: 600;" id="prop-title">Premium Property</h2>
        
        <!-- Media / Thumbnail Panel -->
        <div id="prop-media-panel" style="width: 100%; height: 200px; border-radius: 6px; overflow: hidden; margin-bottom: 1.5rem; border: 1px solid var(--border-color); position: relative; background: #000;">
          <img id="prop-thumbnail" src="" alt="Property Preview" style="width: 100%; height: 100%; object-fit: cover; display: block;" />
          <video id="prop-video" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;" autoplay muted loop></video>
        </div>

        <p style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; margin-bottom: 2rem;" id="prop-meta">
          Unlock standard bidding dossiers, cleared legal documentations, physical inspection records, and verified recovery valuations.
        </p>

        <!-- Password Input Form -->
        <div style="background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 6px; padding: 2rem 1.5rem; margin-bottom: 2rem;">
          <span style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; letter-spacing: 0.05em; display: block; margin-bottom: 1rem;">Enter Access Password</span>
          <input type="password" id="unlock-password" class="form-input" placeholder="••••••••••••" style="text-align: center; font-size: 1.25rem; letter-spacing: 0.1em; border-radius: 4px; margin-bottom: 1.25rem;" />
          <button id="unlock-submit-btn" class="btn-luxury" style="width: 100%; border-radius: 4px; padding: 0.85rem 1.5rem; font-weight: 600; letter-spacing: 0.05em;" onclick="verifyPasswordAccess()">
            UNLOCK PROPERTY
          </button>
          <div id="unlock-error-msg" style="display: none; color: var(--status-cancelled); font-size: 0.85rem; margin-top: 1rem; font-weight: 500;"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- Scripts -->
  <script src="components/navbar.js"></script>
  <script src="components/footer.js"></script>

  <script>
    let activeProperty = null;
    let authSession = null;

    async function loadUnlockRequirement() {
      const loading = document.getElementById('unlock-loading-state');
      const active = document.getElementById('unlock-active-state');
      
      if (!window.supabaseClient) {
        alert("Supabase client is not loaded.");
        return;
      }

      // Check Session state
      const { data: { session }, error: sessionError } = await window.supabaseClient.auth.getSession();
      const isAdmin = localStorage.getItem('isAdmin') === 'true';
      const clientSession = JSON.parse(localStorage.getItem('clientSession') || '{}');

      if (!session && !isAdmin && !clientSession.authenticated) {
        window.location.replace("login.html");
        return;
      }
      
      authSession = session;

      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        alert("Property ID is missing in query.");
        window.location.replace("listings.html");
        return;
      }

      // Fetch Property details for checkout display
      const { data, error } = await window.supabaseClient
        .from('properties')
        .select('*, property_images(*)')
        .eq('id', id);

      if (error || !data || data.length === 0) {
        alert("Property details could not be resolved.");
        window.location.replace("listings.html");
        return;
      }

      activeProperty = data[0];

      // Setup UI details
      document.getElementById('prop-title').textContent = activeProperty.title || activeProperty.property_name || 'Premium Property';
      
      const images = activeProperty.property_images && activeProperty.property_images.length > 0
        ? activeProperty.property_images.map(img => img.image_url)
        : ["https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=600&q=80"];

      const isVid = ['mp4', 'webm', 'ogg', 'mov', 'avi', 'm4v'].includes(images[0].split('?')[0].split('.').pop().toLowerCase());
      const thumbnailImg = document.getElementById('prop-thumbnail');
      const thumbnailVid = document.getElementById('prop-video');

      if (isVid) {
        thumbnailVid.src = images[0];
        thumbnailVid.style.display = 'block';
        thumbnailImg.style.display = 'none';
      } else {
        thumbnailImg.src = images[0];
        thumbnailImg.style.display = 'block';
        thumbnailVid.style.display = 'none';
      }

      const category = activeProperty.property_type || activeProperty.property_classification || 'Villa';
      document.getElementById('prop-meta').innerHTML = `Unlock the full bidding details, verified recovery valuations, and complete judicial title clearance files for this <strong>${category}</strong> in <strong>${activeProperty.city}</strong>.`;

      // Hide loading, show content
      loading.style.display = 'none';
      active.style.display = 'block';
    }

    // Verify Access Password via Supabase RPC
    async function verifyPasswordAccess() {
      const passwordInput = document.getElementById('unlock-password').value.trim();
      const submitBtn = document.getElementById('unlock-submit-btn');
      const errorMsg = document.getElementById('unlock-error-msg');

      if (!passwordInput) {
        errorMsg.textContent = "Please enter the password.";
        errorMsg.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "VERIFYING PASSWORD...";
      errorMsg.style.display = 'none';

      const clientSession = JSON.parse(localStorage.getItem('clientSession') || '{}');
      const userEmail = authSession ? authSession.user.email : (clientSession.email || "client@example.com");

      try {
        const { data: isUnlocked, error } = await window.supabaseClient.rpc('verify_and_unlock_property', {
          p_property_id: activeProperty.id,
          p_password: passwordInput,
          p_user_email: userEmail
        });

        submitBtn.disabled = false;
        submitBtn.textContent = "UNLOCK PROPERTY";

        if (error) {
          console.error("RPC Error:", error);
          errorMsg.textContent = `Error: ${error.message}`;
          errorMsg.style.display = 'block';
          return;
        }

        if (isUnlocked === true) {
          spawnSuccessPopup();
        } else {
          errorMsg.textContent = "Invalid access password. Please try again.";
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        console.error("Exception checking password:", err);
        submitBtn.disabled = false;
        submitBtn.textContent = "UNLOCK PROPERTY";
        errorMsg.textContent = "An unexpected error occurred. Please try again.";
        errorMsg.style.display = 'block';
      }
    }

    function spawnSuccessPopup() {
      const card = document.getElementById('unlock-card-container');
      card.innerHTML = `
        <div style="padding: 2rem 0; text-align: center;">
          <div style="font-size: 4rem; margin-bottom: 1.5rem; animation: checkPop 0.5s ease;">🏆</div>
          <h3 style="font-family: var(--font-serif); font-size: 1.8rem; color: var(--gold-primary); margin-bottom: 1rem;">Property Unlocked</h3>
          <p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.6; margin-bottom: 2.5rem;">
            Access granted successfully. You now have permanent viewing and bidding privileges for this property.
          </p>
          <a href="details.html?id=${activeProperty.id}" class="btn-luxury" style="padding: 0.8rem 2.5rem; text-decoration: none; display: inline-block;">
            GO TO DOSSIER
          </a>
        </div>
      `;

      if (!document.getElementById('check-pop-anim')) {
        const style = document.createElement('style');
        style.id = 'check-pop-anim';
        style.innerHTML = `
          @keyframes checkPop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
          }
        `;
        document.head.appendChild(style);
      }
    }

    window.addEventListener('DOMContentLoaded', loadUnlockRequirement);
  </script>
</body>
</html>
