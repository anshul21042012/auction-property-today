<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Properties | AuctionPropertyToday</title>
  
  <!-- Critical Stylesheets -->
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/pages.css">

  <!-- Immediate Theme Lock & Route Guard -->
  <script>
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);

    const isAdmin = localStorage.getItem('isAdmin') === 'true';
    const clientSession = JSON.parse(localStorage.getItem('clientSession') || '{}');
    if (!isAdmin && (!clientSession || !clientSession.authenticated)) {
      window.location.replace("login.html");
    }
  </script>

  <!-- Supabase Live Ingress -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="services/supabaseClient.js"></script>

  <!-- Full-Width 3-Column Catalog Styles Override -->
  <style>
    .listings-layout {
      grid-template-columns: 1fr !important;
      padding: 3rem 0 6rem 0 !important;
    }
    .listings-grid {
      grid-template-columns: repeat(3, 1fr) !important;
      gap: 2rem !important;
    }
    @media (max-width: 1200px) {
      .listings-grid {
        grid-template-columns: repeat(2, 1fr) !important;
      }
    }
    @media (max-width: 768px) {
      .listings-grid {
        grid-template-columns: 1fr !important;
      }
      .listings-layout {
        padding: 2rem 0 4rem 0 !important;
      }
    }
  </style>
</head>
<body>

  <!-- Listings Hero Header -->
  <section class="listings-hero">
    <div class="container">
      <span class="apple-subtitle">Curated Properties</span>
      <h1 class="luxury-heading" style="font-size:3rem; margin-bottom:0.5rem;">Property Auctions</h1>
      <p style="color:var(--text-secondary); max-width:600px;">Explore verified high-value luxury real estate auctions across India.</p>
    </div>
  </section>

  <!-- Core Content & Listings Layout -->
  <main class="container">
    <div class="listings-layout">

      <!-- Properties Grid & Content Panel -->
      <section class="grid-listings-col">
        <div class="listings-topbar">
          <div class="results-count" id="listings-results-count">Loading properties...</div>
          <div style="display:flex; align-items:center; gap:0.75rem;">
            <span style="font-size:0.8rem; color:var(--text-secondary); text-transform:uppercase; font-weight:600;">Sort By:</span>
            <select id="listings-sort" class="filter-input" style="padding:0.4rem 1rem; width:auto; border-radius:4px;" onchange="applyCatalogFilters()">
              <option value="price-asc">Price: Low to High</option>
              <option value="price-desc" selected>Price: High to Low</option>
              <option value="date-asc">Auction Date: Soonest</option>
            </select>
          </div>
        </div>

        <!-- Shimmer loading state container -->
        <div class="listings-grid" id="listings-catalog-grid">
          <!-- Dynamically populated or skeleton loader -->
        </div>

        <!-- Elegant Pagination -->
        <div class="pagination-container" id="listings-pagination">
          <button class="pagination-btn active">1</button>
          <button class="pagination-btn">2</button>
          <button class="pagination-btn">→</button>
        </div>
      </section>

    </div>
  </main>

  <!-- Scripts -->
  <script src="components/navbar.js"></script>
  <script src="components/quickViewModal.js"></script>
  <script src="components/footer.js"></script>

  <!-- Page Interactivity Scripts -->
  <script>
    // Global filter parameters, initially loaded from URL query params
    let filterState = {
      search: '',
      city: 'all',
      type: 'all',
      bedrooms: 'all',
      minPrice: '',
      maxPrice: '',
      minArea: '',
      maxArea: ''
    };

    // Extract query parameters from URL
    function loadUrlQueryParams() {
      const params = new URLSearchParams(window.location.search);
      
      filterState.city = params.get('city') || 'all';
      filterState.type = params.get('type') || 'all';
      filterState.bedrooms = params.get('bhk') || 'all';
      filterState.search = params.get('search') || '';
    }

    // Apply filters and query Supabase database
    async function applyCatalogFilters() {
      const grid = document.getElementById('listings-catalog-grid');
      const countLabel = document.getElementById('listings-results-count');
      
      if (!grid || !window.supabaseClient) return;

      // 1. Trigger shimmer skeleton loaders across 6 cards (3 per row)
      grid.innerHTML = Array(6).fill(0).map(() => `
        <div class="property-card" style="pointer-events:none;">
          <div class="card-media skeleton"></div>
          <div class="card-content" style="gap:0.75rem;">
            <div class="skeleton" style="height:15px; width:30%; border-radius:2px;"></div>
            <div class="skeleton" style="height:25px; width:80%; border-radius:2px;"></div>
            <div class="skeleton" style="height:20px; width:100%; border-radius:2px; margin: 0.5rem 0;"></div>
            <div class="skeleton" style="height:25px; width:40%; border-radius:2px;"></div>
            <div style="display:grid; grid-template-columns:1.2fr 2fr; gap:0.75rem; margin-top:1.5rem;">
              <div class="skeleton" style="height:35px; border-radius:4px;"></div>
              <div class="skeleton" style="height:35px; border-radius:4px;"></div>
            </div>
          </div>
        </div>
      `).join('');

      countLabel.textContent = "Loading properties...";

      // 2. Fetch parameters from state
      const { search, city, type, bedrooms, minPrice, maxPrice, minArea, maxArea } = filterState;

      // 3. Build live Supabase query
      let query = window.supabaseClient.from('properties').select('*, property_images(*)');

      if (city && city !== "all") query = query.eq('city', city);
      if (type && type !== "all") query = query.eq('property_type', type);
      if (bedrooms && bedrooms !== "all") query = query.eq('bedrooms', parseInt(bedrooms));
      if (minPrice) query = query.gte('price', parseFloat(minPrice) * 10000000);
      if (maxPrice) query = query.lte('price', parseFloat(maxPrice) * 10000000);
      if (minArea) query = query.gte('area_sqft', parseInt(minArea));
      if (maxArea) query = query.lte('area_sqft', parseInt(maxArea));

      // Sorting
      const sortOrder = document.getElementById('listings-sort').value;
      if (sortOrder === 'price-asc') {
        query = query.order('price', { ascending: true });
      } else if (sortOrder === 'price-desc') {
        query = query.order('price', { ascending: false });
      } else if (sortOrder === 'date-asc') {
        query = query.order('auction_date', { ascending: true });
      }

      const { data, error } = await query;

      if (error || !data || data.length === 0) {
        // Render empty state
        countLabel.textContent = "0 Properties";
        grid.innerHTML = `
          <div style="grid-column: span 3; padding: 5rem 2rem;" class="empty-state glassmorphism">
            <div class="empty-icon">🔍</div>
            <h3>No Properties Found</h3>
            <p style="color:var(--text-secondary); max-width:400px; margin: 0.5rem auto 2rem auto;">No properties match the search criteria.</p>
            <button class="btn-luxury" onclick="resetAllCatalogFilters()">Show All Properties</button>
          </div>
        `;
        return;
      }

      // Local keyword match filter (title, description, city)
      let results = data;
      if (search) {
        const keyword = search.toLowerCase();
        results = results.filter(item => {
          const title = item.title || item.property_name || '';
          const desc = item.description || item.property_description || '';
          const city = item.city || '';
          return title.toLowerCase().includes(keyword) || 
                 desc.toLowerCase().includes(keyword) ||
                 city.toLowerCase().includes(keyword);
        });
      }

      if (results.length === 0) {
        countLabel.textContent = "0 Properties";
        grid.innerHTML = `
          <div style="grid-column: span 3; padding: 5rem 2rem;" class="empty-state glassmorphism">
            <div class="empty-icon">🔍</div>
            <h3>No Properties Found</h3>
            <p style="color:var(--text-secondary); max-width:400px; margin: 0.5rem auto 2rem auto;">No properties matched "${search}".</p>
            <button class="btn-luxury" onclick="resetAllCatalogFilters()">Show All Properties</button>
          </div>
        `;
        return;
      }

      // 4. Render property cards dynamically
      countLabel.textContent = `${results.length} Properties Found`;
      grid.innerHTML = '';
      
      results.forEach(item => {
        const images = item.property_images && item.property_images.length > 0
          ? item.property_images.map(img => img.image_url)
          : ["https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&w=1200&q=80"];

        const auctionDate = item.auction_date || new Date().toISOString();
        const rawPrice = item.price || item.reservation_price || 0;
        const priceFormatted = `₹${(rawPrice / 10000000).toFixed(1)} Cr`;

        const pName = item.title || item.property_name || 'Untitled';
        const pClass = item.property_type || item.property_classification || item.type || 'Villa';
        const pArea = item.area_sqft || item.built_area || item.area || 0;
        const pBHK = item.bedrooms || item.bhk_configuration || 1;
        const pBaths = item.bathrooms || item.bathroom_configuration || 1;

        const card = document.createElement('div');
        card.className = 'property-card';
        const isVidL = ['mp4', 'webm', 'ogg', 'mov', 'avi', 'm4v'].includes(images[0].split('?')[0].split('.').pop().toLowerCase());
        card.innerHTML = `
          <div class="card-media">
            ${isVidL ? `
              <video src="${images[0]}" class="card-img" style="object-fit:cover; background:#000;" muted playsinline autoplay loop></video>
            ` : `
              <img src="${images[0]}" alt="${pName}" class="card-img" />
            `}
            ${item.is_featured ? '<span class="badge-featured">Featured</span>' : ''}
            <span class="badge-auction-date">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              <span>${new Date(auctionDate).toLocaleDateString('en-IN', {day:'numeric', month:'short'})}</span>
            </span>
            <div class="card-overlay"></div>
            <div class="card-timer-panel">
              <span class="gold-dot"></span>
              <span class="countdown-timer" data-date="${auctionDate}">Auction Active</span>
            </div>
          </div>
          
          <div class="card-content">
            <span class="card-city">${item.city} • ${pClass}</span>
            <h3 class="card-title">${pName}</h3>
            
            <div class="card-specs">
              <div class="spec-item">
                <span>📐</span>
                <span>${pArea.toLocaleString('en-IN')} sq ft</span>
              </div>
              <div class="spec-item">
                <span>🛏️</span>
                <span>${pBHK} BHK</span>
              </div>
              <div class="spec-item">
                <span>🛁</span>
                <span>${pBaths} Baths</span>
              </div>
            </div>
            
            <div class="card-pricing">
              <div>
                <span class="price-label">Price</span>
                <div class="price-value">${priceFormatted}</div>
              </div>
            </div>
            
            <div class="card-actions">
              <button class="btn-card-quick" onclick="window.quickViewModal.show(${item.id})">Quick View</button>
              <a href="details.html?id=${item.id}" class="btn-card-details flex-center">View Details</a>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });

      startCountdowns();
    }

    // Timer Countdown trigger for cards
    function startCountdowns() {
      const timers = document.querySelectorAll('.countdown-timer');
      timers.forEach(timer => {
        const targetDate = new Date(timer.getAttribute('data-date')).getTime();
        
        function updateTimer() {
          const now = new Date().getTime();
          const distance = targetDate - now;
          
          if (distance < 0) {
            timer.innerHTML = "Auction Active";
            timer.style.color = "var(--gold-hover)";
            return;
          }
          
          const days = Math.floor(distance / (1000 * 60 * 60 * 24));
          const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
          
          timer.innerHTML = `Starts in: ${days}d ${hours}h ${minutes}m`;
        }
        
        updateTimer();
        setInterval(updateTimer, 60000);
      });
    }

    // Reset filters handler (reloads full properties view)
    function resetAllCatalogFilters() {
      // Clear filters in state
      filterState = {
        search: '',
        city: 'all',
        type: 'all',
        bedrooms: 'all',
        minPrice: '',
        maxPrice: '',
        minArea: '',
        maxArea: ''
      };
      
      // Clean URL params quietly without reloading
      const url = new URL(window.location);
      url.search = '';
      window.history.pushState({}, '', url);

      applyCatalogFilters();
    }

    // Bind event handlers on load
    window.addEventListener('DOMContentLoaded', () => {
      loadUrlQueryParams();
      applyCatalogFilters();
    });
  </script>
</body>
</html>
